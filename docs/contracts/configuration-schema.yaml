# DocuMCP Configuration Schema
# Generated from Laravel config files and .env.example
# All environment variables with types, defaults, and descriptions

metadata:
  generated_from: "Laravel config files + .env.example"
  total_variables: 207

variables:
  # ============================================================
  # Application
  # ============================================================
  - name: APP_NAME
    type: string
    default: "Laravel"
    required: true
    description: "Application name displayed in UI, API responses, and used as prefix for cache/session keys"
    config_path: "config/app.php -> name"
    used_by: [app, cache, session, redis, horizon, opentelemetry]

  - name: APP_ENV
    type: string
    default: "production"
    required: true
    description: "Application environment; affects debug behavior, logging, and OAuth client registration defaults"
    config_path: "config/app.php -> env"
    enum: [local, staging, production, testing]
    used_by: [app, documcp]

  - name: APP_DEBUG
    type: boolean
    default: false
    required: false
    description: "Enable debug mode with detailed error messages and stack traces; must be false in production"
    config_path: "config/app.php -> debug"
    used_by: [app]

  - name: APP_URL
    type: url
    default: "http://localhost"
    required: true
    description: "Base URL for the application; used for generating absolute URLs, storage links, OAuth issuer, and EHLO domain"
    config_path: "config/app.php -> url"
    used_by: [app, filesystems, mail, documcp]

  - name: APP_KEY
    type: string
    default: null
    required: true
    description: "Encryption key used by Laravel's encryption services; generate with 'php artisan key:generate'"
    config_path: "config/app.php -> key"
    sensitive: true
    used_by: [app]

  - name: APP_PREVIOUS_KEYS
    type: string
    default: ""
    required: false
    description: "Comma-separated list of previous encryption keys for key rotation"
    config_path: "config/app.php -> previous_keys"
    sensitive: true
    used_by: [app]

  - name: APP_TIMEZONE
    type: string
    default: "UTC"
    required: false
    description: "Default timezone for PHP date functions (hardcoded in config/app.php, overridable in .env)"
    config_path: "config/app.php -> timezone"
    used_by: [app]

  - name: APP_LOCALE
    type: string
    default: "en"
    required: false
    description: "Default application locale for translation and localization"
    config_path: "config/app.php -> locale"
    used_by: [app]

  - name: APP_FALLBACK_LOCALE
    type: string
    default: "en"
    required: false
    description: "Fallback locale when the primary locale translation is missing"
    config_path: "config/app.php -> fallback_locale"
    used_by: [app]

  - name: APP_FAKER_LOCALE
    type: string
    default: "en_US"
    required: false
    description: "Locale used by Faker for generating test data"
    config_path: "config/app.php -> faker_locale"
    used_by: [app]

  - name: APP_MAINTENANCE_DRIVER
    type: string
    default: "file"
    required: false
    description: "Driver for managing maintenance mode status"
    config_path: "config/app.php -> maintenance.driver"
    enum: [file, cache]
    used_by: [app]

  - name: APP_MAINTENANCE_STORE
    type: string
    default: "database"
    required: false
    description: "Cache store used when maintenance driver is 'cache'"
    config_path: "config/app.php -> maintenance.store"
    used_by: [app]

  # ============================================================
  # Octane / RoadRunner
  # ============================================================
  - name: OCTANE_SERVER
    type: string
    default: "roadrunner"
    required: false
    description: "HTTP server backend for Laravel Octane"
    config_path: "config/octane.php -> server"
    enum: [roadrunner, swoole, frankenphp]
    used_by: [octane]

  - name: OCTANE_HTTPS
    type: boolean
    default: false
    required: false
    description: "Force HTTPS for all generated URLs; set true when behind a TLS-terminating reverse proxy (e.g., Traefik)"
    config_path: "config/octane.php -> https"
    used_by: [octane]

  - name: TRUSTED_PROXIES
    type: string
    default: "172.20.0.0/16"
    required: false
    description: "CIDR of the network your reverse proxy runs on; only IPs in this range can set X-Forwarded-* headers"
    config_path: "bootstrap/app.php (not in config/)"
    used_by: [app]

  # ============================================================
  # Database
  # ============================================================
  - name: DB_CONNECTION
    type: string
    default: "sqlite"
    required: true
    description: "Default database connection driver; DocuMCP requires 'pgsql' for production"
    config_path: "config/database.php -> default"
    enum: [sqlite, mysql, mariadb, pgsql, sqlsrv]
    used_by: [database, queue]

  - name: DB_URL
    type: url
    default: null
    required: false
    description: "Full database connection URL (alternative to individual host/port/database settings)"
    config_path: "config/database.php -> connections.*.url"
    sensitive: true
    used_by: [database]

  - name: DB_HOST
    type: string
    default: "127.0.0.1"
    required: true
    description: "Database server hostname or IP address"
    config_path: "config/database.php -> connections.pgsql.host"
    used_by: [database]

  - name: DB_PORT
    type: integer
    default: 5432
    required: false
    description: "Database server port (5432 for PostgreSQL, 3306 for MySQL, 1433 for SQL Server)"
    config_path: "config/database.php -> connections.pgsql.port"
    used_by: [database]

  - name: DB_DATABASE
    type: string
    default: "laravel"
    required: true
    description: "Database name to connect to"
    config_path: "config/database.php -> connections.pgsql.database"
    used_by: [database]

  - name: DB_USERNAME
    type: string
    default: "root"
    required: true
    description: "Database authentication username"
    config_path: "config/database.php -> connections.pgsql.username"
    used_by: [database]

  - name: DB_PASSWORD
    type: string
    default: ""
    required: true
    description: "Database authentication password"
    config_path: "config/database.php -> connections.pgsql.password"
    sensitive: true
    used_by: [database]

  - name: DB_SOCKET
    type: string
    default: ""
    required: false
    description: "Unix socket path for MySQL/MariaDB connections (alternative to host/port)"
    config_path: "config/database.php -> connections.mysql.unix_socket"
    used_by: [database]

  - name: DB_CHARSET
    type: string
    default: "utf8"
    required: false
    description: "Character set for the database connection (utf8 for PostgreSQL, utf8mb4 for MySQL)"
    config_path: "config/database.php -> connections.pgsql.charset"
    used_by: [database]

  - name: DB_COLLATION
    type: string
    default: "utf8mb4_unicode_ci"
    required: false
    description: "Collation for MySQL/MariaDB connections"
    config_path: "config/database.php -> connections.mysql.collation"
    used_by: [database]

  - name: DB_FOREIGN_KEYS
    type: boolean
    default: true
    required: false
    description: "Enable foreign key constraints for SQLite"
    config_path: "config/database.php -> connections.sqlite.foreign_key_constraints"
    used_by: [database]

  - name: MYSQL_ATTR_SSL_CA
    type: path
    default: null
    required: false
    description: "Path to SSL CA certificate for MySQL/MariaDB TLS connections"
    config_path: "config/database.php -> connections.mysql.options"
    used_by: [database]

  - name: DB_CACHE_CONNECTION
    type: string
    default: null
    required: false
    description: "Database connection for cache store when using database cache driver"
    config_path: "config/cache.php -> stores.database.connection"
    used_by: [cache]

  - name: DB_CACHE_TABLE
    type: string
    default: "cache"
    required: false
    description: "Database table name for cache storage"
    config_path: "config/cache.php -> stores.database.table"
    used_by: [cache]

  - name: DB_CACHE_LOCK_CONNECTION
    type: string
    default: null
    required: false
    description: "Database connection for cache lock operations"
    config_path: "config/cache.php -> stores.database.lock_connection"
    used_by: [cache]

  - name: DB_CACHE_LOCK_TABLE
    type: string
    default: null
    required: false
    description: "Database table name for cache lock storage"
    config_path: "config/cache.php -> stores.database.lock_table"
    used_by: [cache]

  - name: DB_QUEUE_CONNECTION
    type: string
    default: null
    required: false
    description: "Database connection for queue storage when using database queue driver"
    config_path: "config/queue.php -> connections.database.connection"
    used_by: [queue]

  - name: DB_QUEUE_TABLE
    type: string
    default: "jobs"
    required: false
    description: "Database table name for queue jobs"
    config_path: "config/queue.php -> connections.database.table"
    used_by: [queue]

  - name: DB_QUEUE
    type: string
    default: "default"
    required: false
    description: "Default queue name for database queue driver"
    config_path: "config/queue.php -> connections.database.queue"
    used_by: [queue]

  - name: DB_QUEUE_RETRY_AFTER
    type: integer
    default: 90
    required: false
    description: "Seconds before a database queue job is retried after failure"
    config_path: "config/queue.php -> connections.database.retry_after"
    used_by: [queue]

  # ============================================================
  # Redis
  # ============================================================
  - name: REDIS_CLIENT
    type: string
    default: "phpredis"
    required: false
    description: "PHP Redis client library to use"
    config_path: "config/database.php -> redis.client"
    enum: [phpredis, predis]
    used_by: [redis]

  - name: REDIS_URL
    type: url
    default: null
    required: false
    description: "Full Redis connection URL (alternative to individual host/port settings)"
    config_path: "config/database.php -> redis.default.url"
    sensitive: true
    used_by: [redis, reverb]

  - name: REDIS_HOST
    type: string
    default: "127.0.0.1"
    required: true
    description: "Redis server hostname or IP address"
    config_path: "config/database.php -> redis.default.host"
    used_by: [redis, reverb]

  - name: REDIS_USERNAME
    type: string
    default: null
    required: false
    description: "Redis authentication username (Redis 6+ ACL)"
    config_path: "config/database.php -> redis.default.username"
    used_by: [redis, reverb]

  - name: REDIS_PASSWORD
    type: string
    default: null
    required: false
    description: "Redis authentication password"
    config_path: "config/database.php -> redis.default.password"
    sensitive: true
    used_by: [redis, reverb]

  - name: REDIS_PORT
    type: integer
    default: 6379
    required: false
    description: "Redis server port"
    config_path: "config/database.php -> redis.default.port"
    used_by: [redis, reverb]

  - name: REDIS_DB
    type: integer
    default: 0
    required: false
    description: "Redis database number for the default connection"
    config_path: "config/database.php -> redis.default.database"
    used_by: [redis, reverb]

  - name: REDIS_CACHE_DB
    type: integer
    default: 1
    required: false
    description: "Redis database number for the cache connection"
    config_path: "config/database.php -> redis.cache.database"
    used_by: [redis, cache]

  - name: REDIS_CLUSTER
    type: string
    default: "redis"
    required: false
    description: "Redis cluster configuration type"
    config_path: "config/database.php -> redis.options.cluster"
    used_by: [redis]

  - name: REDIS_PREFIX
    type: string
    default: "{app-name}-database-"
    required: false
    description: "Prefix for all Redis keys (derived from APP_NAME by default)"
    config_path: "config/database.php -> redis.options.prefix"
    used_by: [redis]

  - name: REDIS_PERSISTENT
    type: boolean
    default: false
    required: false
    description: "Use persistent Redis connections"
    config_path: "config/database.php -> redis.options.persistent"
    used_by: [redis]

  - name: REDIS_MAX_RETRIES
    type: integer
    default: 3
    required: false
    description: "Maximum number of retry attempts for Redis operations"
    config_path: "config/database.php -> redis.default.max_retries"
    used_by: [redis]

  - name: REDIS_BACKOFF_ALGORITHM
    type: string
    default: "decorrelated_jitter"
    required: false
    description: "Backoff algorithm for Redis retry logic"
    config_path: "config/database.php -> redis.default.backoff_algorithm"
    used_by: [redis]

  - name: REDIS_BACKOFF_BASE
    type: integer
    default: 100
    required: false
    description: "Base delay in milliseconds for Redis retry backoff"
    config_path: "config/database.php -> redis.default.backoff_base"
    used_by: [redis]

  - name: REDIS_BACKOFF_CAP
    type: integer
    default: 1000
    required: false
    description: "Maximum delay in milliseconds for Redis retry backoff"
    config_path: "config/database.php -> redis.default.backoff_cap"
    used_by: [redis]

  - name: REDIS_TIMEOUT
    type: integer
    default: 60
    required: false
    description: "Redis connection timeout in seconds (used by Reverb scaling)"
    config_path: "config/reverb.php -> servers.reverb.scaling.server.timeout"
    used_by: [redis, reverb]

  - name: REDIS_CACHE_CONNECTION
    type: string
    default: "cache"
    required: false
    description: "Redis connection name for the cache store"
    config_path: "config/cache.php -> stores.redis.connection"
    used_by: [cache]

  - name: REDIS_CACHE_LOCK_CONNECTION
    type: string
    default: "default"
    required: false
    description: "Redis connection name for cache lock operations"
    config_path: "config/cache.php -> stores.redis.lock_connection"
    used_by: [cache]

  - name: REDIS_QUEUE_CONNECTION
    type: string
    default: "default"
    required: false
    description: "Redis connection name for the queue driver"
    config_path: "config/queue.php -> connections.redis.connection"
    used_by: [queue]

  - name: REDIS_QUEUE
    type: string
    default: "default"
    required: false
    description: "Default queue name for Redis queue driver"
    config_path: "config/queue.php -> connections.redis.queue"
    used_by: [queue]

  # ============================================================
  # Cache
  # ============================================================
  - name: CACHE_STORE
    type: string
    default: "database"
    required: false
    description: "Default cache store driver"
    config_path: "config/cache.php -> default"
    enum: [array, database, file, memcached, redis, dynamodb, octane, failover]
    used_by: [cache]

  - name: CACHE_PREFIX
    type: string
    default: "{app-name}-cache-"
    required: false
    description: "Prefix for all cache keys (derived from APP_NAME by default)"
    config_path: "config/cache.php -> prefix"
    used_by: [cache]

  # ============================================================
  # Session
  # ============================================================
  - name: SESSION_DRIVER
    type: string
    default: "database"
    required: false
    description: "Session storage driver; DocuMCP uses 'redis' for production"
    config_path: "config/session.php -> driver"
    enum: [file, cookie, database, memcached, redis, dynamodb, array]
    used_by: [session]

  - name: SESSION_LIFETIME
    type: integer
    default: 120
    required: false
    description: "Session idle timeout in minutes before expiration"
    config_path: "config/session.php -> lifetime"
    used_by: [session]

  - name: SESSION_EXPIRE_ON_CLOSE
    type: boolean
    default: false
    required: false
    description: "Expire session when the browser is closed"
    config_path: "config/session.php -> expire_on_close"
    used_by: [session]

  - name: SESSION_ENCRYPT
    type: boolean
    default: true
    required: false
    description: "Encrypt all session data before storage; enabled by default for security"
    config_path: "config/session.php -> encrypt"
    used_by: [session]

  - name: SESSION_CONNECTION
    type: string
    default: null
    required: false
    description: "Database or Redis connection to use for session storage"
    config_path: "config/session.php -> connection"
    used_by: [session]

  - name: SESSION_TABLE
    type: string
    default: "sessions"
    required: false
    description: "Database table name for session storage"
    config_path: "config/session.php -> table"
    used_by: [session]

  - name: SESSION_STORE
    type: string
    default: null
    required: false
    description: "Cache store to use for cache-driven session backends"
    config_path: "config/session.php -> store"
    used_by: [session]

  - name: SESSION_COOKIE
    type: string
    default: "{app-name}-session"
    required: false
    description: "Name of the session cookie (derived from APP_NAME by default)"
    config_path: "config/session.php -> cookie"
    used_by: [session]

  - name: SESSION_PATH
    type: string
    default: "/"
    required: false
    description: "Cookie path scope for the session cookie"
    config_path: "config/session.php -> path"
    used_by: [session]

  - name: SESSION_DOMAIN
    type: string
    default: null
    required: false
    description: "Cookie domain for the session cookie; null uses root domain"
    config_path: "config/session.php -> domain"
    used_by: [session]

  - name: SESSION_SECURE_COOKIE
    type: boolean
    default: null
    required: false
    description: "Only send session cookie over HTTPS; set true in production with TLS"
    config_path: "config/session.php -> secure"
    used_by: [session]

  - name: SESSION_HTTP_ONLY
    type: boolean
    default: true
    required: false
    description: "Prevent JavaScript access to the session cookie (XSS protection)"
    config_path: "config/session.php -> http_only"
    used_by: [session]

  - name: SESSION_SAME_SITE
    type: string
    default: "lax"
    required: false
    description: "SameSite attribute for the session cookie (CSRF protection)"
    config_path: "config/session.php -> same_site"
    enum: [lax, strict, none]
    used_by: [session]

  - name: SESSION_PARTITIONED_COOKIE
    type: boolean
    default: false
    required: false
    description: "Tie the session cookie to the top-level site in cross-site contexts"
    config_path: "config/session.php -> partitioned"
    used_by: [session]

  # ============================================================
  # Queue
  # ============================================================
  - name: QUEUE_CONNECTION
    type: string
    default: "database"
    required: true
    description: "Default queue connection driver; DocuMCP uses 'redis' for production"
    config_path: "config/queue.php -> default"
    enum: [sync, database, beanstalkd, sqs, redis, deferred, background, failover]
    used_by: [queue]

  - name: QUEUE_FAILED_DRIVER
    type: string
    default: "database-uuids"
    required: false
    description: "Driver for storing failed queue jobs"
    config_path: "config/queue.php -> failed.driver"
    enum: [database-uuids, dynamodb, file, "null"]
    used_by: [queue]

  # ============================================================
  # Mail
  # ============================================================
  - name: MAIL_MAILER
    type: string
    default: "log"
    required: false
    description: "Default mail transport driver"
    config_path: "config/mail.php -> default"
    enum: [smtp, sendmail, mailgun, ses, ses-v2, postmark, resend, log, array, failover, roundrobin]
    used_by: [mail]

  - name: MAIL_SCHEME
    type: string
    default: null
    required: false
    description: "SMTP connection scheme (e.g., tls)"
    config_path: "config/mail.php -> mailers.smtp.scheme"
    used_by: [mail]

  - name: MAIL_URL
    type: url
    default: null
    required: false
    description: "Full SMTP connection URL (alternative to individual settings)"
    config_path: "config/mail.php -> mailers.smtp.url"
    sensitive: true
    used_by: [mail]

  - name: MAIL_HOST
    type: string
    default: "127.0.0.1"
    required: false
    description: "SMTP server hostname"
    config_path: "config/mail.php -> mailers.smtp.host"
    used_by: [mail]

  - name: MAIL_PORT
    type: integer
    default: 2525
    required: false
    description: "SMTP server port"
    config_path: "config/mail.php -> mailers.smtp.port"
    used_by: [mail]

  - name: MAIL_USERNAME
    type: string
    default: null
    required: false
    description: "SMTP authentication username"
    config_path: "config/mail.php -> mailers.smtp.username"
    used_by: [mail]

  - name: MAIL_PASSWORD
    type: string
    default: null
    required: false
    description: "SMTP authentication password"
    config_path: "config/mail.php -> mailers.smtp.password"
    sensitive: true
    used_by: [mail]

  - name: MAIL_ENCRYPTION
    type: string
    default: null
    required: false
    description: "SMTP encryption method (referenced in .env.example; actual config uses MAIL_SCHEME)"
    config_path: ".env.example only"
    enum: [tls, ssl, "null"]
    used_by: [mail]

  - name: MAIL_EHLO_DOMAIN
    type: string
    default: null
    required: false
    description: "Local domain for SMTP EHLO command; defaults to APP_URL hostname"
    config_path: "config/mail.php -> mailers.smtp.local_domain"
    used_by: [mail]

  - name: MAIL_FROM_ADDRESS
    type: string
    default: "hello@example.com"
    required: false
    description: "Global 'From' email address for all outgoing emails"
    config_path: "config/mail.php -> from.address"
    used_by: [mail]

  - name: MAIL_FROM_NAME
    type: string
    default: "Example"
    required: false
    description: "Global 'From' name for all outgoing emails"
    config_path: "config/mail.php -> from.name"
    used_by: [mail]

  - name: MAIL_SENDMAIL_PATH
    type: path
    default: "/usr/sbin/sendmail -bs -i"
    required: false
    description: "Path to the sendmail binary"
    config_path: "config/mail.php -> mailers.sendmail.path"
    used_by: [mail]

  - name: MAIL_LOG_CHANNEL
    type: string
    default: null
    required: false
    description: "Log channel to use when mail driver is 'log'"
    config_path: "config/mail.php -> mailers.log.channel"
    used_by: [mail]

  # ============================================================
  # Search / Meilisearch / Scout
  # ============================================================
  - name: MEILISEARCH_HOST
    type: url
    default: "http://localhost:7700"
    required: true
    description: "Meilisearch server URL for full-text search"
    config_path: "config/meilisearch.php -> host, config/scout.php -> meilisearch.host"
    used_by: [meilisearch, scout]

  - name: MEILISEARCH_KEY
    type: string
    default: null
    required: true
    description: "Meilisearch master API key for authentication"
    config_path: "config/meilisearch.php -> key, config/scout.php -> meilisearch.key"
    sensitive: true
    used_by: [meilisearch, scout]

  - name: SCOUT_DRIVER
    type: string
    default: "meilisearch"
    required: false
    description: "Search engine driver for Laravel Scout"
    config_path: "config/scout.php -> driver"
    enum: [algolia, meilisearch, typesense, database, collection, "null"]
    used_by: [scout]

  - name: SCOUT_PREFIX
    type: string
    default: ""
    required: false
    description: "Prefix applied to all search index names; useful for multi-tenant setups"
    config_path: "config/scout.php -> prefix"
    used_by: [scout]

  - name: SCOUT_QUEUE
    type: boolean
    default: false
    required: false
    description: "Queue search index sync operations for better performance"
    config_path: "config/scout.php -> queue"
    used_by: [scout]

  - name: SCOUT_IDENTIFY
    type: boolean
    default: false
    required: false
    description: "Notify the search engine of the user performing the search (Algolia only)"
    config_path: "config/scout.php -> identify"
    used_by: [scout]

  - name: ALGOLIA_APP_ID
    type: string
    default: ""
    required: false
    description: "Algolia application ID"
    config_path: "config/scout.php -> algolia.id"
    used_by: [scout]

  - name: ALGOLIA_SECRET
    type: string
    default: ""
    required: false
    description: "Algolia admin API key"
    config_path: "config/scout.php -> algolia.secret"
    sensitive: true
    used_by: [scout]

  # ============================================================
  # OIDC / OAuth
  # ============================================================
  - name: OIDC_PROVIDER_URL
    type: url
    default: null
    required: false
    description: "OIDC provider issuer URL for user SSO login and MCP API authentication"
    config_path: "config/documcp.php -> auth.oidc.issuer"
