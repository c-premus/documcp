  # ---------------------------------------------------------------------------
  # OAuth 2.1
  # ---------------------------------------------------------------------------
  /.well-known/oauth-authorization-server:
    get:
      operationId: oauthDiscovery
      tags: [OAuth]
      summary: OAuth Authorization Server Metadata
      description: |
        RFC 8414: Returns OAuth Authorization Server Metadata, including supported
        endpoints, grant types, response types, and PKCE methods.
      responses:
        "200":
          description: Server metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthServerMetadata"
        "404":
          description: Metadata endpoint disabled

  /.well-known/oauth-protected-resource/{path}:
    parameters:
      - name: path
        in: path
        required: false
        description: Optional path suffix identifying the specific protected resource (e.g., `documcp`)
        schema:
          type: string
        allowEmptyValue: true

    get:
      operationId: oauthProtectedResourceMetadata
      tags: [OAuth]
      summary: OAuth Protected Resource Metadata
      description: |
        RFC 9728: Returns protected resource metadata, enabling MCP clients to
        discover the authorization server location and required scopes.
      responses:
        "200":
          description: Protected resource metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource:
                    type: string
                    format: uri
                  authorization_servers:
                    type: array
                    items:
                      type: string
                      format: uri
                  scopes_supported:
                    type: array
                    items:
                      type: string
                  bearer_methods_supported:
                    type: array
                    items:
                      type: string
        "404":
          description: Metadata endpoint disabled

  /oauth/register:
    post:
      operationId: oauthRegisterClient
      tags: [OAuth]
      summary: Dynamic Client Registration
      description: |
        RFC 7591: Register a new OAuth client dynamically. When authentication is
        required (production default), only admin users may register clients.
        Rate limit: `oauth-register` (10/hour + 50/day per IP).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_name, redirect_uris]
              properties:
                client_name:
                  type: string
                  maxLength: 255
                  description: Human-readable client name
                redirect_uris:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uri
                  description: Array of valid redirect URIs
                grant_types:
                  type: [array, "null"]
                  items:
                    type: string
                    enum: [authorization_code, refresh_token, "urn:ietf:params:oauth:grant-type:device_code"]
                  description: Grant types the client will use
                response_types:
                  type: [array, "null"]
                  items:
                    type: string
                    enum: [code]
                  description: Response types the client will use
                scope:
                  type: [string, "null"]
                  description: Space-separated list of requested scopes
                token_endpoint_auth_method:
                  type: [string, "null"]
                  enum: [none, client_secret_post]
                  description: Authentication method for the token endpoint
                software_id:
                  type: [string, "null"]
                  maxLength: 255
                  description: Identifier for the client software
                software_version:
                  type: [string, "null"]
                  maxLength: 100
                  description: Version of the client software
      responses:
        "201":
          description: Client registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthClientRegistrationResponse"
        "400":
          description: Invalid client metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "401":
          description: Authentication required
        "403":
          description: Insufficient permissions
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"

  /oauth/authorize:
    get:
      operationId: oauthAuthorize
      tags: [OAuth]
      summary: Authorization endpoint
      description: |
        OAuth 2.1: Authorization endpoint. Shows consent screen to authenticated user.
        Public clients MUST use PKCE with S256. Requires user authentication (redirects
        to login if not authenticated). Rate limit: `oauth-authorize` (30/min per IP).
      parameters:
        - name: response_type
          in: query
          required: true
          description: Must be "code" for authorization code flow
          schema:
            type: string
            enum: [code]
        - name: client_id
          in: query
          required: true
          description: The client identifier issued during registration
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          description: URI to redirect to after authorization
          schema:
            type: string
            format: uri
        - name: state
          in: query
          required: true
          description: CSRF protection token (minimum 8 characters)
          schema:
            type: string
            minLength: 8
        - name: scope
          in: query
          description: Space-separated list of requested scopes
          schema:
            type: [string, "null"]
        - name: code_challenge
          in: query
          description: PKCE code challenge (required for public clients)
          schema:
            type: [string, "null"]
        - name: code_challenge_method
          in: query
          description: PKCE method (must be S256)
          schema:
            type: [string, "null"]
            enum: [S256]
      responses:
        "200":
          description: Consent screen (HTML)
          content:
            text/html:
              schema:
                type: string
        "302":
          description: Redirect to login page
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"

  /oauth/authorize/approve:
    post:
      operationId: oauthAuthorizeApprove
      tags: [OAuth]
      summary: Approve authorization
      description: |
        OAuth 2.1: Handle user consent. Generates an authorization code and redirects
        to the client's redirect URI. Requires active session. Form submitted from
        the consent screen. Rate limit: `oauth-authorize` (30/min per IP).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [client_id, redirect_uri, nonce]
              properties:
                client_id:
                  type: string
                  description: The client identifier
                redirect_uri:
                  type: string
                  format: uri
                  description: The redirect URI for the callback
                scope:
                  type: [string, "null"]
                  description: Space-separated list of approved scopes
                state:
                  type: [string, "null"]
                  description: CSRF protection state parameter
                code_challenge:
                  type: [string, "null"]
                  description: PKCE code challenge
                code_challenge_method:
                  type: [string, "null"]
                  enum: [S256]
                  description: PKCE method
                nonce:
                  type: string
                  format: uuid
                  description: Authorization request nonce to prevent TOCTOU attacks
      responses:
        "302":
          description: Redirect to client with authorization code
          headers:
            Location:
              description: Redirect URI with `code` and optional `state` query parameters
              schema:
                type: string
                format: uri
        "400":
          description: Invalid or expired request
        "401":
          description: User not authenticated
        "429":
          description: Too many requests

  /oauth/token:
    post:
      operationId: oauthToken
      tags: [OAuth]
      summary: Token endpoint
      description: |
        OAuth 2.1: Exchange authorization code, refresh token, or device code for
        access tokens. Rate limit: `oauth-token` (30/min + 100/hour per IP).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token, "urn:ietf:params:oauth:grant-type:device_code"]
                  description: The grant type being used
                client_id:
                  type: string
                  description: The client identifier
                client_secret:
                  type: [string, "null"]
                  description: Client secret (required for confidential clients)
                code:
                  type: string
                  description: Authorization code (required for authorization_code grant)
                redirect_uri:
                  type: string
                  format: uri
                  description: Redirect URI used in the authorization request (required for authorization_code grant)
                code_verifier:
                  type: [string, "null"]
                  description: PKCE code verifier (required if code_challenge was used)
                refresh_token:
                  type: string
                  description: Refresh token (required for refresh_token grant)
                scope:
                  type: [string, "null"]
                  description: Space-separated scopes (cannot exceed original scope)
                device_code:
                  type: string
                  description: Device code (required for device_code grant)
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
        "400":
          description: Invalid request or unsupported grant type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"

  /oauth/revoke:
    post:
      operationId: oauthRevoke
      tags: [OAuth]
      summary: Revoke token
      description: |
        RFC 7009: Revoke an access token or refresh token. Always returns 200 per
        the specification, even if the token was already revoked or invalid.
        Rate limit: `oauth-token` (30/min + 100/hour per IP).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token, client_id]
              properties:
                token:
                  type: string
                  description: The token to revoke
                client_id:
                  type: string
                  description: The client identifier
                client_secret:
                  type: [string, "null"]
                  description: Client secret (required for confidential clients)
                token_type_hint:
                  type: [string, "null"]
                  enum: [access_token, refresh_token]
                  description: Hint about the type of token
      responses:
        "200":
          description: Token revoked (empty body on success)
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"

  /oauth/device/code:
    post:
      operationId: oauthDeviceAuthorization
      tags: [OAuth]
      summary: Device Authorization
      description: |
        RFC 8628: Request device authorization. Returns a device code and user code
        for the user to enter at the verification URI. Rate limit: `oauth-device`
        (30/min per IP).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id:
                  type: string
                  description: The client identifier
                scope:
                  type: [string, "null"]
                  description: Space-separated list of requested scopes
      responses:
        "200":
          description: Device authorization response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthDeviceAuthorizationResponse"
        "400":
          description: Invalid client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"

  /oauth/device:
    get:
      operationId: oauthDeviceVerificationPage
      tags: [OAuth]
      summary: Device verification page
      description: |
        RFC 8628: Displays a form for the user to enter the user code shown on their
        device. Redirects to login if not authenticated. Rate limit: `oauth-device-verify`
        (5/min + 30/hour per IP).
      parameters:
        - name: user_code
          in: query
          description: Pre-fill the user code input
          schema:
            type: string
      responses:
        "200":
          description: Device verification form (HTML)
          content:
            text/html:
              schema:
                type: string
        "302":
          description: Redirect to login page
        "429":
          description: Too many requests

    post:
      operationId: oauthDeviceVerificationSubmit
      tags: [OAuth]
      summary: Submit device user code
      description: |
        RFC 8628: Validates the user code and shows device consent screen.
        Rate limit: `oauth-device-verify` (5/min + 30/hour per IP).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [user_code]
              properties:
                user_code:
                  type: string
                  maxLength: 9
                  description: User code displayed on the device
      responses:
        "200":
          description: Device consent screen or error view (HTML)
          content:
            text/html:
              schema:
                type: string
        "302":
          description: Redirect to login page
        "429":
          description: Too many requests

  /oauth/device/approve:
    post:
      operationId: oauthDeviceApprove
      tags: [OAuth]
      summary: Approve or deny device authorization
      description: |
        RFC 8628: Approve or deny device authorization. Requires active session.
        Form submitted from the device consent screen.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [user_code, approve]
              properties:
                user_code:
                  type: string
                  maxLength: 9
                  description: User code displayed on the device
                approve:
                  type: string
                  enum: [approve, deny]
                  description: Whether to approve or deny
      responses:
        "200":
          description: Success or error view (HTML)
          content:
            text/html:
              schema:
                type: string
        "401":
          description: User not authenticated

# =============================================================================
# Components
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # --- Envelopes ---
    ApiSuccessEnvelope:
      type: object
      properties:
        data:
          description: Response payload
        meta:
          type: object
          description: Optional metadata (contents vary by endpoint)

    ApiErrorEnvelope:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: HTTP status text (e.g. "Bad Request", "Not Found")
        message:
          type: string
          description: Human-readable error detail

    PaginatedEnvelope:
      type: object
      properties:
        data:
          type: array
          items: {}
        meta:
          type: object
          required: [total, limit, offset]
          properties:
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer

    ApiExceptionResponse:
      type: object
      description: API exception response (non-OAuth endpoints)
      properties:
        message:
          type: string
        status:
          type: integer
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Field-level validation errors (422 only)
        meta:
          type: object
          properties:
            request_id:
              type: [string, "null"]

    ValidationErrorResponse:
      type: object
      description: Validation error response (422)
      properties:
        message:
          type: string
          example: Validation failed
        status:
          type: integer
          example: 422
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            title: ["The title field is required."]
        meta:
          type: object
          properties:
            request_id:
              type: [string, "null"]

    OAuthErrorResponse:
      type: object
      description: OAuth error response (RFC 6749)
      required: [error]
      properties:
        error:
          type: string
          description: Error code
          example: invalid_request
        error_description:
          type: string
          description: Human-readable error description
          example: The request is missing a required parameter.

    # --- Resources ---
    Document:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: [string, "null"]
        file_type:
          type: string
          enum: [pdf, docx, xlsx, html, markdown]
        file_size:
          type: integer
          description: File size in bytes
        mime_type:
          type: string
        word_count:
          type: [integer, "null"]
        is_public:
          type: boolean
        status:
          type: string
          description: Processing status
        content_hash:
          type: [string, "null"]
        tags:
          type: array
          items:
            type: string
        user:
          $ref: "#/components/schemas/User"
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: [string, "null"]
          format: date-time

    ZimArchive:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        title:
          type: string
        description:
          type: [string, "null"]
        language:
          type: [string, "null"]
        category:
          type: [string, "null"]
          enum: [devdocs, wikipedia, stack_exchange, other]
        creator:
          type: [string, "null"]
        publisher:
          type: [string, "null"]
        article_count:
          type: [integer, "null"]
        media_count:
          type: [integer, "null"]
        file_size:
          type: [integer, "null"]
          description: File size in bytes
        file_size_human:
          type: [string, "null"]
        tags:
          type: [array, "null"]
          items:
            type: string
        last_synced_at:
          type: [string, "null"]
          format: date-time

    ZimArticle:
      type: object
      properties:
        archive_name:
          type: string
        path:
          type: string
        title:
          type: string
        content:
          type: string
        mime_type:
          type: string

    ZimArticleSearchResult:
      type: object
      properties:
        archive_name:
          type: string
        title:
          type: string
        path:
          type: string
        snippet:
          type: [string, "null"]
        score:
          type: [number, "null"]

    GitTemplate:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: [string, "null"]
        repository_url:
          type: string
          format: uri
        branch:
          type: string
        category:
          type: string
          enum: [claude, memory-bank, project]
        tags:
          type: [array, "null"]
          items:
            type: string
        is_public:
          type: boolean
        is_enabled:
          type: boolean
        status:
          type: string
          description: "Sync status (e.g., pending, syncing, synced, failed)"
        error_message:
          type: [string, "null"]
        file_count:
          type: integer
        total_size_bytes:
          type: integer
        total_size_human:
          type: string
        last_synced_at:
          type: [string, "null"]
          format: date-time
        last_commit_sha:
          type: [string, "null"]
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    GitTemplateFile:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        path:
          type: string
        filename:
          type: string
        extension:
          type: [string, "null"]
        size_bytes:
          type: integer
        size_human:
          type: string
        is_essential:
          type: boolean
        content_hash:
          type: [string, "null"]
        variables:
          type: [array, "null"]
          items:
            type: string
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    GitTemplateStructure:
      type: object
      properties:
        template_uuid:
          type: string
          format: uuid
        template_name:
          type: string
        file_count:
          type: integer
        total_size_bytes:
          type: integer
        total_size_human:
          type: string
        essential_files:
          type: array
          items:
            type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/GitTemplateFile"
        directories:
          type: array
          items:
            type: string

    DeploymentGuide:
      type: object
      properties:
        template_uuid:
          type: string
          format: uuid
        template_name:
          type: string
        essential_files:
          type: object
          additionalProperties:
            type: string
          description: Map of essential file paths to their content
        memory_bank_files:
          type: object
          additionalProperties:
            type: string
          description: Map of memory bank file paths to their content
        variables_used:
          type: array
          items:
            type: string
        variables_provided:
          type: object
          additionalProperties:
            type: string
        variables_missing:
          type: array
          items:
            type: string

    DocumentAnalysisSuggestions:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        language:
          type: string
        word_count:
          type: integer
        estimated_reading_time:
          type: string

    UnifiedSearchResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UnifiedSearchResult"
        meta:
          type: object
          properties:
            query:
              type: string
            total:
              type: integer
            processing_time_ms:
              type: number
            limit:
              type: integer
            offset:
              type: integer

    UnifiedSearchResult:
      type: object
      properties:
        uuid:
          type: string
        source:
          type: string
          enum: [document, git_template, zim_archive]
        title:
          type: string
        description:
          type: [string, "null"]
        relevance_score:
          type: number
        metadata:
          type: object
          additionalProperties: true

    SearchResponse:
      type: object
      description: PostgreSQL FTS search results
      properties:
        data:
          type: array
          items:
            type: object
            description: Normalized search hit
        meta:
          type: object
          properties:
            query:
              type: string
            total:
              type: integer
            processing_time_ms:
              type: number
            limit:
              type: integer
            offset:
              type: integer

    # --- Health ---
    HealthBasicResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy]
        timestamp:
          type: string
          format: date-time
        application:
          type: string
        environment:
          type: string

    HealthDeepResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        timestamp:
          type: string
          format: date-time
        application:
          type: string
        environment:
          type: string
        checks:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                latency_ms:
                  type: number
                connection:
                  type: string
                error:
                  type: string
            redis:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                latency_ms:
                  type: number
                error:
                  type: string
            filesystem:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                writable:
                  type: boolean
                error:
                  type: string
            queue:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                driver:
                  type: string
                active_supervisors:
                  type: integer
                error:
                  type: string

    # --- OAuth responses ---
    OAuthServerMetadata:
      type: object
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        revocation_endpoint:
          type: string
          format: uri
        registration_endpoint:
          type: string
          format: uri
        device_authorization_endpoint:
          type: string
          format: uri
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string
        scopes_supported:
          type: array
          items:
            type: string
        protected_resources:
          type: array
          items:
            type: string
            format: uri

    OAuthClientRegistrationResponse:
      type: object
      properties:
        client_id:
          type: string
        client_id_issued_at:
          type: integer
          description: Unix timestamp of client registration
        client_name:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
        grant_types:
          type: array
          items:
            type: string
        response_types:
          type: array
          items:
            type: string
        token_endpoint_auth_method:
          type: string
        scope:
          type: [string, "null"]
        client_secret:
          type: string
          description: Only included for confidential clients (token_endpoint_auth_method != none)
        client_secret_expires_at:
          type: integer
          description: Unix timestamp when secret expires (0 = never). Only for confidential clients.

    OAuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Token lifetime in seconds
        refresh_token:
          type: [string, "null"]
        scope:
          type: [string, "null"]

    OAuthDeviceAuthorizationResponse:
      type: object
      required: [device_code, user_code, verification_uri, expires_in, interval]
      properties:
        device_code:
          type: string
        user_code:
          type: string
          description: Code for the user to enter at the verification URI
        verification_uri:
          type: string
          format: uri
        verification_uri_complete:
          type: string
          format: uri
          description: Verification URI with user_code pre-filled
        expires_in:
          type: integer
          description: Device code lifetime in seconds (default 900)
        interval:
          type: integer
          description: Polling interval in seconds

  # ---------------------------------------------------------------------------
  # Responses
  # ---------------------------------------------------------------------------
  responses:
    Unauthenticated:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiExceptionResponse"
          example:
            message: Unauthenticated
            status: 401
            meta:
              request_id: null

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiExceptionResponse"
          example:
            message: Forbidden
            status: 403
            meta:
              request_id: null

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
          example:
            error:
              message: Resource not found
              code: 404
            meta:
              timestamp: "2026-01-15T10:30:00+00:00"

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

    RateLimitExceeded:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiExceptionResponse"
          example:
            message: Too Many Attempts.
            status: 429
            meta:
              request_id: null
      headers:
        Retry-After:
          description: Seconds until the rate limit resets
          schema:
            type: integer

    InternalUnauthorized:
      description: Valid INTERNAL_API_TOKEN bearer token required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized
              message:
                type: string
                example: Valid bearer token required.

  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token obtained via OAuth 2.1 flow

    cookieAuth:
      type: apiKey
      in: cookie
      name: documcp_session
      description: Session cookie for browser-based OAuth consent flows

    internalToken:
      type: http
      scheme: bearer
      description: |
        Static INTERNAL_API_TOKEN for observability endpoints (/metrics, /api/health/deep).
        When INTERNAL_API_TOKEN is not configured, access is unrestricted.

    oauth2:
      type: oauth2
      description: |
        OAuth 2.1 with PKCE (S256 required for public clients).
        Supports authorization_code, refresh_token, and device_code grants.
      flows:
        authorizationCode:
          authorizationUrl: /oauth/authorize
          tokenUrl: /oauth/token
          refreshUrl: /oauth/token
          scopes:
            mcp:access: Access the MCP endpoint
            documents:read: Read documents and search
            documents:write: "Create, update, and delete documents"
            search:read: Search across all indexes
            zim:read: Read ZIM archives and articles
            templates:read: Read Git templates and files
            templates:write: "Create, update, and delete Git templates"
            services:read: Read external service configuration
            services:write: Manage external services
            admin: Full administrative access
