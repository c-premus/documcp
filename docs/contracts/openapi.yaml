openapi: "3.1.0"
info:
  title: DocuMCP API
  description: |
    Documentation management through REST API and OAuth 2.1.

    DocuMCP serves documentation through REST endpoints and the Model Context Protocol (MCP),
    enabling AI agents to access and search your knowledge base. It processes PDF, DOCX, XLSX,
    HTML, and Markdown documents, provides full-text search via PostgreSQL, and authenticates
    via OIDC with RFC 7591 dynamic client registration support.

    ## Authentication

    Most API endpoints require a Bearer token obtained through the OAuth 2.1 flow.
    Public endpoints (health check, document search) do not require authentication.

    OAuth 2.1 supports:
    - **Authorization Code** with mandatory PKCE (S256) for public clients
    - **Refresh Token** for long-lived sessions
    - **Device Code** (RFC 8628) for CLI tools

    ## Rate Limiting

    | Limiter           | Limit                          | Applies To                        |
    |-------------------|--------------------------------|-----------------------------------|
    | `search`          | 120/min per user or IP         | Search and autocomplete endpoints |
    | `api-read`        | 60/min per user or IP          | General API read operations       |
    | `api-write`       | 30/min per user or IP          | Document/template write operations|
    | `oauth-token`     | 30/min + 100/hour per IP       | Token endpoint                    |
    | `oauth-register`  | 10/hour + 50/day per IP        | Client registration               |
    | `oauth-authorize` | 30/min per IP                  | Authorization endpoint            |
    | `oauth-device`    | 30/min per IP                  | Device authorization endpoint     |
    | `admin`           | 60/min per user or IP          | Admin panel operations            |

    ## Response Envelopes

    **Success:** `{ data, meta? }`

    **Error:** `{ error: "<StatusText>", message: "<details>" }`

    **Paginated:** `{ data[], meta: { total, limit, offset } }`

    **OAuth error:** `{ error, error_description }` (RFC 6749)
  version: "1.0.0"
  contact:
    name: DocuMCP
  license:
    name: MIT

servers:
  - url: "{baseUrl}"
    description: DocuMCP server
    variables:
      baseUrl:
        default: "http://localhost:8080"

tags:
  - name: Health
    description: Health check endpoints for monitoring
  - name: Search
    description: Full-text search and autocomplete across documents
  - name: Documents
    description: Document CRUD and file management
  - name: ZIM Archives
    description: Access ZIM archive documentation (DevDocs, Wikipedia, Stack Exchange)
  - name: Git Templates
    description: Manage Git-based project templates
  - name: OAuth
    description: OAuth 2.1 authorization server endpoints
  - name: Observability
    description: Internal metrics and deep health checks

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /api/health:
    get:
      operationId: healthBasic
      tags: [Health]
      summary: Basic health check
      description: |
        Fast health check for load balancers and uptime monitoring.
        Returns 200 OK if the application is running. No authentication required.
      responses:
        "200":
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthBasicResponse"

  /api/health/deep:
    get:
      operationId: healthDeep
      tags: [Observability]
      summary: Deep health check
      description: |
        Comprehensive health check testing all dependencies (database, Redis,
        filesystem, queue). Protected by the `internal` middleware --
        requires the `INTERNAL_API_TOKEN` bearer token when configured.
      security:
        - internalToken: []
      responses:
        "200":
          description: All checks passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthDeepResponse"
        "401":
          $ref: "#/components/responses/InternalUnauthorized"
        "503":
          description: One or more checks failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthDeepResponse"

  /metrics:
    get:
      operationId: prometheusMetrics
      tags: [Observability]
      summary: Prometheus metrics
      description: |
        Exposes application metrics in Prometheus text format for scraping.
        Protected by the `internal` middleware -- requires the `INTERNAL_API_TOKEN`
        bearer token when configured.
      security:
        - internalToken: []
      responses:
        "200":
          description: Prometheus metrics payload
          content:
            "text/plain; version=0.0.4":
              schema:
                type: string
        "401":
          $ref: "#/components/responses/InternalUnauthorized"

  # ---------------------------------------------------------------------------
  # Search
  # ---------------------------------------------------------------------------
  /api/search:
    get:
      operationId: searchDocuments
      tags: [Search]
      summary: Search documents
      description: |
        Full-text search with facets, filters, and highlighting via PostgreSQL full-text search.
        Public endpoint (no authentication required). Rate limit: `search` (120/min).

        **Required scope:** `search:read`
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string
          schema:
            type: string
            minLength: 1
            maxLength: 255
        - name: file_type
          in: query
          description: Filter by document file type
          schema:
            type: string
            enum: [pdf, docx, xlsx, html, markdown]
        - name: tags
          in: query
          description: Filter by tags (documents must match ALL specified tags)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: limit
          in: query
          description: Maximum results to return (default 20)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Number of results to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/search/popular:
    get:
      operationId: popularSearches
      tags: [Search]
      summary: Popular searches
      description: |
        Returns the most popular search queries. Public endpoint. Rate limit: `search` (120/min).

        **Required scope:** `search:read`
      responses:
        "200":
          description: Popular search queries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            query:
                              type: string
                            count:
                              type: integer
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/search/autocomplete:
    get:
      operationId: autocompleteSearch
      tags: [Search]
      summary: Autocomplete search suggestions
      description: |
        Returns document title suggestions for autocomplete. Requires authentication.
        Rate limit: `search` (120/min).

        **Required scope:** `search:read`
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          required: true
          description: Search prefix (minimum 2 characters)
          schema:
            type: string
            minLength: 2
            maxLength: 100
        - name: limit
          in: query
          description: Maximum number of suggestions (default 5)
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
      responses:
        "200":
          description: Autocomplete suggestions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          suggestions:
                            type: array
                            items:
                              type: object
                              properties:
                                text:
                                  type: string
                                highlighted:
                                  type: string
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/search/unified:
    get:
      operationId: unifiedSearch
      tags: [Search]
      summary: Unified search
      description: |
        Search across all content types (documents, git templates, ZIM archives)
        in a single request. Requires authentication.
        Rate limit: `search` (120/min).

        **Required scope:** `search:read`
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query text
          schema:
            type: string
            minLength: 1
            maxLength: 255
        - name: types
          in: query
          description: Filter to specific content types (max 4)
          schema:
            type: array
            maxItems: 4
            items:
              type: string
              enum: [document, git_template, zim_archive]
          style: form
          explode: true
        - name: limit
          in: query
          description: Maximum results to return (default 20)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Pagination offset (default 0)
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Unified search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnifiedSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  # ---------------------------------------------------------------------------
  # Documents
  # ---------------------------------------------------------------------------
  /api/documents:
    get:
      operationId: listDocuments
      tags: [Documents]
      summary: List documents
      description: |
        Retrieve a paginated list of documents. Requires authentication.
        Rate limit: `api-read` (60/min).

        **Required scope:** `documents:read`
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Items per page (default 15, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
        - name: file_type
          in: query
          description: Filter by document file type
          schema:
            type: string
            enum: [pdf, docx, xlsx, html, markdown]
      responses:
        "200":
          description: Paginated list of documents
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Document"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

    post:
      operationId: createDocument
      tags: [Documents]
      summary: Create document
      description: |
        Upload and process a new document. Supports PDF, DOCX, XLSX, HTML, and Markdown.
        Maximum file size: 50 MB. Requires authentication. Rate limit: `api-write` (30/min).

        **Required scope:** `documents:write` + admin role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Document file (PDF, DOCX, XLSX, HTML, Markdown). Max 50 MB."
                title:
                  type: string
                  maxLength: 255
                  description: Document title
                description:
                  type: [string, "null"]
                  description: Optional document description
                is_public:
                  type: boolean
                  default: false
                  description: Whether the document is publicly accessible
                tags:
                  type: array
                  items:
                    type: string
                    maxLength: 100
                  description: Tags for categorization
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Document"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/documents/{document}:
    parameters:
      - name: document
        in: path
        required: true
        description: Document UUID
        schema:
          type: string
          format: uuid
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

    get:
      operationId: showDocument
      tags: [Documents]
      summary: Show document
      description: |
        Retrieve a specific document by UUID. Requires authentication.
        Rate limit: `api-read` (60/min).

        **Required scope:** `documents:read`
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Document"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

    put:
      operationId: updateDocument
      tags: [Documents]
      summary: Update document
      description: |
        Update document metadata. Requires authentication and ownership or admin role.
        Rate limit: `api-write` (30/min).

        **Required scope:** `documents:write` + admin role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 255
                  description: Updated document title
                description:
                  type: string
                  description: Updated description
                is_public:
                  type: boolean
                  description: Updated public visibility
                tags:
                  type: array
                  items:
                    type: string
                    maxLength: 100
                  description: Replaces all existing tags
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Document"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

    delete:
      operationId: deleteDocument
      tags: [Documents]
      summary: Delete document
      description: |
        Soft-delete a document. Requires authentication and ownership or admin role.
        Rate limit: `api-write` (30/min).

        **Required scope:** `documents:write` + admin role
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/documents/{document}/download:
    parameters:
      - name: document
        in: path
        required: true
        description: Document UUID
        schema:
          type: string
          format: uuid

    get:
      operationId: downloadDocument
      tags: [Documents]
      summary: Download document file
      description: |
        Download the original document file. Requires authentication.
        Rate limit: 10 downloads per minute.

        **Required scope:** `documents:read`
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Binary file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/documents/analyze:
    post:
      operationId: analyzeDocument
      tags: [Documents]
      summary: Analyze document
      description: |
        Upload a file for analysis and receive metadata suggestions including title,
        description, tags, language, word count, and estimated reading time.
        Requires authentication. Rate limit: 10 analyses per minute.

        **Required scope:** `documents:write` + admin role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Document file to analyze (PDF, DOC, DOCX, XLS, XLSX, HTML, Markdown, TXT). Max 50 MB."
      responses:
        "200":
          description: Analysis results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  suggestions:
                    $ref: "#/components/schemas/DocumentAnalysisSuggestions"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: false
                  message:
                    type: string

  # ---------------------------------------------------------------------------
  # ZIM Archives
  # ---------------------------------------------------------------------------
  /api/zim/archives:
    get:
      operationId: listZimArchives
      tags: [ZIM Archives]
      summary: List ZIM archives
      description: |
        Retrieve a paginated list of available ZIM archives.
        Requires authentication. Rate limit: `search` (120/min).

        **Required scope:** `zim:read`
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          description: Search query to filter archives by name or title
          schema:
            type: string
            minLength: 1
            maxLength: 255
        - name: category
          in: query
          description: Filter by archive category
          schema:
            type: string
            enum: [devdocs, wikipedia, stack_exchange, other]
        - name: language
          in: query
          description: Filter by language code (ISO 639-1, 2 characters)
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - name: per_page
          in: query
          description: Items per page (default 15, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
      responses:
        "200":
          description: Paginated list of ZIM archives
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ZimArchive"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/zim/archives/{archive}:
    parameters:
      - name: archive
        in: path
        required: true
        description: Archive name identifier
        schema:
          type: string
        example: devdocs.io_python_3.12

    get:
      operationId: showZimArchive
      tags: [ZIM Archives]
      summary: Show ZIM archive
      description: |
        Retrieve details of a specific ZIM archive by name.
        Requires authentication. Rate limit: `search` (120/min).

        **Required scope:** `zim:read`
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Archive details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ZimArchive"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/zim/archives/{archive}/search:
    parameters:
      - name: archive
        in: path
        required: true
        description: Archive name identifier
        schema:
          type: string
        example: devdocs.io_laravel_11

    get:
      operationId: searchZimArticles
      tags: [ZIM Archives]
      summary: Search ZIM articles
      description: |
        Full-text search within a ZIM archive's articles.
        Requires authentication. Rate limit: `search` (120/min).

        **Required scope:** `zim:read`
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Full-text search query for article content
          schema:
            type: string
            minLength: 1
            maxLength: 255
        - name: limit
          in: query
          description: Maximum results to return (default 20, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ZimArticleSearchResult"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/zim/archives/{archive}/suggest:
    parameters:
      - name: archive
        in: path
        required: true
        description: Archive name identifier
        schema:
          type: string
        example: devdocs.io_laravel_11

    get:
      operationId: suggestZimArticles
      tags: [ZIM Archives]
      summary: Suggest ZIM articles
      description: |
        Title autocomplete/suggestions for a ZIM archive.
        Requires authentication. Rate limit: `search` (120/min).

        **Required scope:** `zim:read`
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search term for title autocomplete (minimum 2 characters)
          schema:
            type: string
            minLength: 2
            maxLength: 255
        - name: limit
          in: query
          description: Maximum suggestions to return (default 10, max 50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Article suggestions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ZimArticleSearchResult"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/zim/archives/{archive}/articles/{path}:
    parameters:
      - name: archive
        in: path
        required: true
        description: Archive name identifier
        schema:
          type: string
        example: devdocs.io_laravel_11
      - name: path
        in: path
        required: true
        description: Article path within the archive (may contain slashes)
        schema:
          type: string
        example: middleware.html

    get:
      operationId: readZimArticle
      tags: [ZIM Archives]
      summary: Read ZIM article
      description: |
        Retrieve the full content of a specific article from a ZIM archive.
        Requires authentication. Rate limit: `search` (120/min).

        **Required scope:** `zim:read`
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Article content
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ZimArticle"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  # ---------------------------------------------------------------------------
  /api/git-templates:
    get:
      operationId: listGitTemplates
      tags: [Git Templates]
      summary: List Git templates
      description: |
        Retrieve a list of available Git templates.
        Requires authentication. Rate limit: `api-read` (60/min).

        **Required scope:** `templates:read`
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          description: Filter by template category
          schema:
            type: string
            enum: [claude, memory-bank, project]
        - name: limit
          in: query
          description: Maximum templates to return (default 50, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: List of Git templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/GitTemplate"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

    post:
      operationId: registerGitTemplate
      tags: [Git Templates]
      summary: Register a new Git template
      description: |
        Register a Git repository as a template source. A sync job is dispatched
        automatically. Requires authentication and admin role.
        Rate limit: `api-write` (30/min).

        **Required scope:** `templates:write` + admin role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, repository_url, category]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Human-readable name for the template
                repository_url:
                  type: string
                  format: uri
                  maxLength: 500
                  description: HTTPS URL of the Git repository
                description:
                  type: [string, "null"]
                  maxLength: 1000
                  description: Description of the template purpose
                branch:
                  type: string
                  maxLength: 100
                  default: main
                  pattern: "^[a-zA-Z0-9._/-]+$"
                  description: Git branch to use
                git_token:
                  type: [string, "null"]
                  maxLength: 500
                  description: Personal access token for private repositories (stored encrypted)
                category:
                  type: string
                  enum: [claude, memory-bank, project]
                  description: Template category
                tags:
                  type: [array, "null"]
                  maxItems: 20
                  items:
                    type: string
                    maxLength: 50
                  description: Tags for categorization and search
                is_public:
                  type: [boolean, "null"]
                  default: false
                  description: Whether the template is publicly visible
      responses:
        "201":
          description: Template registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GitTemplate"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

