name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26.2"
          cache: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.11.4

      - name: Migration safety lint
        run: bash scripts/check-migrations.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26.2"
          cache: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Run tests (unit + integration)
        run: go test -race -tags integration -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"
          COV_INT=${COVERAGE%.*}
          if [ "$COV_INT" -lt "70" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold 70%"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26.2"
          cache: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Build and scan binary
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go build -o bin/documcp ./cmd/documcp
          govulncheck -mode=binary ./bin/documcp 2>&1 | tee /tmp/vulncheck.out || true

          # Fail only if fixable vulnerabilities exist (have a "Fixed in" version).
          # Unfixed vulns (Fixed in: N/A) are tracked but don't block CI.
          if grep -q 'Fixed in: v' /tmp/vulncheck.out; then
            echo "::error::Fixable vulnerabilities found — upgrade the affected modules"
            exit 1
          fi
          if grep -q 'Vulnerability #' /tmp/vulncheck.out; then
            echo "::warning::Unfixed vulnerabilities detected (no patch available) — see scan output above"
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Audit dependencies
        # Includes devDependencies (vite, vitest, openapi-ts, eslint, etc.) so
        # build-tool supply-chain compromise is visible. --audit-level=high keeps
        # the gate at the same severity bar.
        run: cd frontend && npm audit --audit-level=high

      - name: Type check
        run: cd frontend && npx vue-tsc --noEmit

      - name: Run tests
        run: cd frontend && npx vitest run

  grafana:
    name: Grafana Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      - name: Generate Grafana dashboard and alerts
        run: cd grafana && npm ci && npm run generate

      - name: Verify dashboard and alerts are up-to-date
        run: git diff --exit-code dist/documcp.json dist/alerts/documcp.json
