name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  DOCKERHUB_IMAGE: cpremus/documcp
  GHCR_IMAGE: ghcr.io/c-premus/documcp

jobs:
  release:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      # Renovate will SHA-pin this on the next run (pinDigests: true).
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Docker Hub: attest to GitHub's store only. Do NOT push a referrer
      # manifest to Docker Hub — buildx already embeds SLSA provenance and
      # SBOMs inside the fat manifest via `provenance: mode=max, sbom: true`,
      # and Docker Hub's public API cannot garbage-collect separate referrer
      # manifests once their subject index is untagged (Advanced Image
      # Management endpoints were removed from the public API in 2023).
      - name: Attest Docker Hub image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: docker.io/${{ env.DOCKERHUB_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}

      - name: Attest GHCR image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Sigstore keyless signing — uses the workflow's OIDC token to obtain a
      # short-lived Fulcio cert, signs the image digest, records the signature
      # to the public Rekor transparency log. Verifiable with:
      #   cosign verify <image>@<digest> \
      #     --certificate-identity-regexp 'https://github\.com/c-premus/documcp/' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
      # GHCR: signature pushed as a referrer manifest in the registry.
      # Docker Hub: --upload=false records the signature in Rekor only — the
      # registry-side referrer manifest is skipped because Docker Hub has no
      # public API to GC orphan manifests once a tag rolls off (same constraint
      # the attest-build-provenance step above documents).
      - name: Sign GHCR image
        run: cosign sign --yes ${{ env.GHCR_IMAGE }}@${{ steps.push.outputs.digest }}

      - name: Sign Docker Hub image
        run: cosign sign --yes --upload=false docker.io/${{ env.DOCKERHUB_IMAGE }}@${{ steps.push.outputs.digest }}

      # Docker Hub tag retention. We can't prune untagged manifests from here:
      # the "Advanced Image Management" API (/v2/namespaces/.../images) was
      # removed from public access in 2023 and now only backs the web UI.
      # Orphan manifests left behind when tags expire rely on Docker Hub's
      # own background GC. To avoid *generating* additional orphans, we also
      # do not push referrer attestations to Docker Hub (see the attest step
      # above) — buildx embeds provenance/SBOM inside the fat manifest.
      - name: Clean up old Docker Hub tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          NAMESPACE="cpremus"
          IMAGE="documcp"
          KEEP=10

          # Authenticate
          LOGIN_RESP=$(curl -sS -w "\n%{http_code}" "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}")
          LOGIN_CODE=$(echo "${LOGIN_RESP}" | tail -n1)
          LOGIN_BODY=$(echo "${LOGIN_RESP}" | sed '$d')
          if [ "${LOGIN_CODE}" != "200" ]; then
            echo "::error::Docker Hub login failed (HTTP ${LOGIN_CODE}): ${LOGIN_BODY}"
            exit 1
          fi
          HUB_TOKEN=$(printf '%s' "${LOGIN_BODY}" | jq -r .token)

          # Page through every tag (not just the first 100)
          TAGS_FILE=$(mktemp)
          URL="https://hub.docker.com/v2/repositories/${NAMESPACE}/${IMAGE}/tags/?page_size=100&ordering=last_updated"
          # ordering=last_updated is ascending, so the oldest tags appear first — flipped below
          while [ -n "${URL}" ] && [ "${URL}" != "null" ]; do
            PAGE=$(curl -sSf -H "Authorization: Bearer ${HUB_TOKEN}" "${URL}")
            echo "${PAGE}" | jq -r '.results[] | "\(.last_updated)\t\(.name)"' >> "${TAGS_FILE}"
            URL=$(echo "${PAGE}" | jq -r '.next // ""')
          done

          # Newest first, strip timestamp, skip the KEEP newest, emit the rest
          DELETE_FILE=$(mktemp)
          sort -r "${TAGS_FILE}" | cut -f2- | tail -n "+$((KEEP + 1))" > "${DELETE_FILE}"

          TOTAL=$(wc -l < "${TAGS_FILE}" | tr -d ' ')
          DELETE_COUNT=$(wc -l < "${DELETE_FILE}" | tr -d ' ')
          echo "Tags: total=${TOTAL}, keep=${KEEP}, to-delete=${DELETE_COUNT}"

          if [ "${DELETE_COUNT}" = "0" ]; then
            echo "Nothing to delete."
            exit 0
          fi

          FAIL=0
          while IFS= read -r TAG; do
            [ -z "${TAG}" ] && continue
            HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X DELETE \
              "https://hub.docker.com/v2/repositories/${NAMESPACE}/${IMAGE}/tags/${TAG}/" \
              -H "Authorization: Bearer ${HUB_TOKEN}")
            if [ "${HTTP}" = "204" ] || [ "${HTTP}" = "200" ]; then
              echo "  deleted: ${TAG}"
            else
              echo "::warning::failed to delete tag ${TAG} (HTTP ${HTTP})"
              FAIL=$((FAIL + 1))
            fi
          done < "${DELETE_FILE}"

          echo "Done. deleted=$((DELETE_COUNT - FAIL)), failed=${FAIL}"
          [ "${FAIL}" = "0" ]

      # Multi-arch builds + attestations create ~5 versions per release
      - name: Clean up old GHCR versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55  # v5.0.0
        continue-on-error: true
        with:
          package-name: documcp
          package-type: container
          min-versions-to-keep: 25
          delete-only-untagged-versions: false
