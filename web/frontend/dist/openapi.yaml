      responses:
        "200":
          description: File metadata and content
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          file:
                            $ref: "#/components/schemas/GitTemplateFile"
                          content:
                            type: string
                            description: File content (with variable substitution if provided)
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/git-templates/{template}/deployment-guide:
    parameters:
      - name: template
        in: path
