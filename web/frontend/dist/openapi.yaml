      description: |
        Retrieve the file tree structure of a Git template.
        Requires authentication. Rate limit: `api-read` (60/min).

        **Required scope:** `templates:read`
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Template file structure
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GitTemplateStructure"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/git-templates/{template}/files/{path}:
    parameters:
      - name: template
