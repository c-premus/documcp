  # ---------------------------------------------------------------------------
  /api/git-templates:
    get:
      operationId: listGitTemplates
      tags: [Git Templates]
      summary: List Git templates
      description: |
        Retrieve a list of available Git templates.
        Requires authentication. Rate limit: `api-read` (60/min).

        **Required scope:** `templates:read`
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          description: Filter by template category
          schema:
            type: string
            enum: [claude, memory-bank, project]
        - name: limit
          in: query
          description: Maximum templates to return (default 50, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: List of Git templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/GitTemplate"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

    post:
      operationId: registerGitTemplate
      tags: [Git Templates]
      summary: Register a new Git template
      description: |
        Register a Git repository as a template source. A sync job is dispatched
        automatically. Only text files are extracted — binary files (PDFs, images,
        compiled artifacts) are excluded. Per-file limit: 1 MB, total: 10 MB.
        Requires authentication and admin role.
        Rate limit: `api-write` (30/min).

        **Required scope:** `templates:write` + admin role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, repository_url, category]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Human-readable name for the template
                repository_url:
                  type: string
                  format: uri
                  maxLength: 500
                  description: HTTPS URL of the Git repository
                description:
                  type: [string, "null"]
                  maxLength: 1000
                  description: Description of the template purpose
                branch:
                  type: string
                  maxLength: 100
                  default: main
                  pattern: "^[a-zA-Z0-9._/-]+$"
                  description: Git branch to use
                git_token:
                  type: [string, "null"]
                  maxLength: 500
                  description: Personal access token for private repositories (stored encrypted)
                category:
                  type: string
                  enum: [claude, memory-bank, project]
                  description: Template category
                tags:
                  type: [array, "null"]
                  maxItems: 20
                  items:
                    type: string
                    maxLength: 50
                  description: Tags for categorization and search
                is_public:
                  type: [boolean, "null"]
                  default: false
                  description: Whether the template is publicly visible
      responses:
        "201":
          description: Template registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GitTemplate"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/git-templates/search:
    get:
      operationId: searchGitTemplates
      tags: [Git Templates]
      summary: Search Git templates
      description: |
        Full-text search across template README files and metadata.
        Requires authentication. Rate limit: `api-read` (60/min).

        **Required scope:** `templates:read`
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
            minLength: 1
            maxLength: 255
        - name: category
          in: query
          description: Filter by template category
          schema:
            type: string
            enum: [claude, memory-bank, project]
        - name: limit
          in: query
          description: Maximum results (default 10, max 50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          hits:
                            type: array
                            items:
                              type: object
                              description: Search hit with highlights
                          total:
                            type: integer
                          processing_time_ms:
                            type: integer
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/git-templates/{template}:
    parameters:
      - name: template
        in: path
        required: true
        description: Template UUID
        schema:
          type: string
          format: uuid
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

    get:
      operationId: showGitTemplate
      tags: [Git Templates]
      summary: Show Git template
      description: |
        Retrieve a specific Git template by UUID.
        Requires authentication. Rate limit: `api-read` (60/min).

        **Required scope:** `templates:read`
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GitTemplate"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

    put:
      operationId: updateGitTemplate
      tags: [Git Templates]
      summary: Update Git template
      description: |
        Update Git template metadata.
        Requires authentication and ownership or admin role.
        Rate limit: `api-write` (30/min).

        **Required scope:** `templates:write` + admin role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: [string, "null"]
                  maxLength: 1000
                repository_url:
                  type: string
                  format: uri
                  maxLength: 500
                branch:
                  type: string
                  maxLength: 100
                  pattern: "^[a-zA-Z0-9._/-]+$"
                git_token:
                  type: [string, "null"]
                  maxLength: 500
                  description: Pass null to remove the token
                category:
                  type: string
                  enum: [claude, memory-bank, project]
                tags:
                  type: [array, "null"]
                  maxItems: 20
                  items:
                    type: string
                    maxLength: 50
                is_public:
                  type: [boolean, "null"]
                is_enabled:
                  type: [boolean, "null"]
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GitTemplate"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

    delete:
      operationId: deleteGitTemplate
      tags: [Git Templates]
      summary: Delete Git template
      description: |
        Soft-delete a Git template and remove cloned repository files.
        Requires authentication and ownership or admin role.
        Rate limit: `api-write` (30/min).

        **Required scope:** `templates:write` + admin role
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Template deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/git-templates/{template}/sync:
    parameters:
      - name: template
        in: path
        required: true
        description: Template UUID
        schema:
          type: string
          format: uuid
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

    post:
      operationId: syncGitTemplate
      tags: [Git Templates]
      summary: Trigger template sync
      description: |
        Re-sync the template from its Git repository to fetch latest changes.
        Only text files are extracted — binary files are excluded.
        Requires authentication. Rate limit: `api-write` (30/min).

        **Required scope:** `templates:write` + admin role
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Template synced
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GitTemplate"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
