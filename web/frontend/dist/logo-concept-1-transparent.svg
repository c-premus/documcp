  <!-- Text lines -->
  <line x1="18" y1="26" x2="44" y2="26" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="34" x2="38" y2="34" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="42" x2="42" y2="42" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>

  <!-- Connection node (MCP indicator) -->
  <circle cx="50" cy="50" r="10" fill="#3b82f6"/>
  <circle cx="50" cy="50" r="4" fill="#ffffff"/>

  <!-- Radiating connection lines -->
  <path d="M56 44 L60 40" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
