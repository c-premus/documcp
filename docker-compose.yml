services:
  app:
    image: ghcr.io/c-premus/documcp:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "8080:8080"
      # Uncomment when TLS_ENABLED=true:
      # - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App
      APP_NAME: DocuMCP
      APP_ENV: production
      APP_URL: ${APP_URL:-http://localhost}
      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      TRUSTED_PROXIES: "172.16.0.0/12"
      # TLS: set TLS_ENABLED=true to terminate HTTPS directly (skip reverse proxy).
      # SERVER_PORT (8080) becomes HTTP→HTTPS redirect; TLS_PORT (8443) serves HTTPS.
      # Omit cert/key paths to auto-generate a self-signed cert (dev only).
      # When using cert files, mount them via volumes (see volumes section below).
      # TLS_ENABLED: false
      # TLS_PORT: 8443
      # TLS_CERT_FILE: /certs/cert.pem
      # TLS_KEY_FILE: /certs/key.pem
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      # SSL mode for PostgreSQL connections. Options: disable, allow, prefer, require, verify-ca, verify-full
      # For managed databases (AWS RDS, GCP Cloud SQL, etc.), use "require" or stricter.
      # Only use "disable" for local/dev databases without TLS.
      DB_SSLMODE: ${DB_SSLMODE:-require}
      # OIDC
      OIDC_PROVIDER_URL: ${OIDC_PROVIDER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      # OAuth
      OAUTH_SESSION_SECRET: ${OAUTH_SESSION_SECRET:?OAUTH_SESSION_SECRET is required}
      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      HKDF_SALT: ${HKDF_SALT:-}
      # Redis
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Storage
      STORAGE_DRIVER: local
      STORAGE_BASE_PATH: /data/storage
    volumes:
      - document_storage:/data/storage
      # Uncomment to mount TLS certificates (required when TLS_CERT_FILE is set):
      # - ./certs:/certs:ro
    networks:
      - documcp
    healthcheck:
      test: ["CMD", "/documcp", "health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.documcp.rule=Host(`${TRAEFIK_HOST:-documcp.localhost}`)"
      - "traefik.http.routers.documcp.entrypoints=websecure"
      - "traefik.http.routers.documcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.documcp.loadbalancer.server.port=8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - documcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-documcp} -d ${DB_DATABASE:-documcp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  redis:
    image: redis:8-alpine@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72
    # Set a password for Redis. Generate one with: openssl rand -base64 32
    # Then set REDIS_PASSWORD in your .env file. The app service references the same variable.
    command: >-
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      - documcp
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  traefik:
    image: traefik:v3.6@sha256:171c9c3565b29f6c133f1c1b43c5d4e5853415198e9e1078c001f8702ff66aec
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=documcp"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL is required}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - documcp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped

networks:
  documcp:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  document_storage:
  letsencrypt:
