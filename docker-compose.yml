services:
  app:
    image: ghcr.io/c-premus/documcp:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App
      APP_NAME: DocuMCP
      APP_ENV: production
      APP_URL: ${APP_URL:-http://localhost}
      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      TRUSTED_PROXIES: "172.16.0.0/12"
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      # SSL mode for PostgreSQL connections. Options: disable, allow, prefer, require, verify-ca, verify-full
      # For managed databases (AWS RDS, GCP Cloud SQL, etc.), use "require" or stricter.
      # Only use "disable" for local/dev databases without TLS.
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      # OIDC
      OIDC_PROVIDER_URL: ${OIDC_PROVIDER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      # OAuth
      OAUTH_SESSION_SECRET: ${OAUTH_SESSION_SECRET:?OAUTH_SESSION_SECRET is required}
      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      HKDF_SALT: ${HKDF_SALT:-}
      # Redis
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Storage
      STORAGE_DRIVER: local
      STORAGE_BASE_PATH: /data/storage
    volumes:
      - document_storage:/data/storage
    networks:
      - documcp
    healthcheck:
      test: ["CMD", "/documcp", "health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.documcp.rule=Host(`${TRAEFIK_HOST:-documcp.localhost}`)"
      - "traefik.http.routers.documcp.entrypoints=websecure"
      - "traefik.http.routers.documcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.documcp.loadbalancer.server.port=8080"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - documcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-documcp} -d ${DB_DATABASE:-documcp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    # Set a password for Redis. Generate one with: openssl rand -base64 32
    # Then set REDIS_PASSWORD in your .env file. The app service references the same variable.
    command: >-
      redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - documcp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped

  traefik:
    image: traefik:v3.4
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=documcp"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - documcp
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped

networks:
  documcp:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  document_storage:
  letsencrypt:
